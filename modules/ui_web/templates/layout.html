<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#059669">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="manifest" href="/static/manifest.json">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: manipulation;
        }
        .btn-large {
            min-height: 64px;
            font-size: 1.25rem;
        }
        .keypad-btn {
            min-height: 72px;
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-emerald-600 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center">
                        <span class="text-emerald-600 font-bold text-lg">D</span>
                    </div>
                    <span class="text-xl font-bold">Digna</span>
                </div>
                <div class="text-sm opacity-90">
                    ID: {{.EntityID}}
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <a href="/pdv" class="btn-large bg-amber-500 hover:bg-amber-600 text-white rounded-xl p-4 flex flex-col items-center justify-center shadow-md transition">
                <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="font-semibold">Vendas (PDV)</span>
            </a>

            <a href="/social" class="btn-large bg-blue-500 hover:bg-blue-600 text-white rounded-xl p-4 flex flex-col items-center justify-center shadow-md transition">
                <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="font-semibold">Ponto Social</span>
            </a>

            <a href="/dashboard" class="btn-large bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl p-4 flex flex-col items-center justify-center shadow-md transition">
                <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                </svg>
                <span class="font-semibold">Painel Dignidade</span>
            </a>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Bem-vindo ao Digna</h2>
            <p class="text-gray-600 mb-4">
                Sistema de Gestão Cooperativa da Providentia Foundation. 
                Registre vendas, controle horas de trabalho e visualize o impacto social da sua cooperativa.
            </p>
            
            <div class="bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded">
                <p class="text-emerald-700 text-sm">
                    <strong>Status:</strong> Sistema operacional | <strong>Versão:</strong> v.0 MVP
                </p>
            </div>
        </div>
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
