<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV - Digna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: manipulation;
        }
        .keypad-btn {
            min-height: 72px;
            font-size: 1.5rem;
            font-weight: bold;
            user-select: none;
        }
        .keypad-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-amber-500 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <a href="/" class="text-white hover:text-amber-100">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </a>
                    <span class="text-xl font-bold">PDV - Vendas</span>
                </div>
                <div class="text-sm">
                    Saldo: <span id="balance" hx-get="/api/balance" hx-trigger="load, every 5s" class="font-bold">R$ 0,00</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-4 max-w-md">
        <div id="sale-result" class="mb-4"></div>

        <div class="bg-white rounded-2xl shadow-lg p-6 mb-4">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Produto</label>
                <select id="product" class="w-full p-3 border-2 border-gray-200 rounded-xl text-lg focus:border-amber-500 focus:outline-none">
                    <option value="Mel">Mel Orgânico - R$ 25,00</option>
                    <option value="Artesanato">Artesanato - R$ 35,00</option>
                    <option value="Servicos">Serviços - R$ 50,00</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Valor</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-xl font-bold">R$</span>
                    <input type="text" id="display" readonly value="0,00" 
                        class="w-full p-4 pl-12 text-right text-3xl font-bold border-2 border-gray-200 rounded-xl bg-gray-50">
                </div>
            </div>

            <input type="hidden" id="amount" name="amount" value="0">

            <div class="grid grid-cols-3 gap-3 mb-3">
                <button onclick="addDigit('1')" class="keypad-btn bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 active:bg-gray-100">1</button>
                <button onclick="addDigit('2')" class="keypad-btn bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 active:bg-gray-100">2</button>
                <button onclick="addDigit('3')" class="keypad-btn bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 active:bg-gray-100">3</button>
                
                <button onclick="addDigit('4')" class="keypad-btn bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 active:bg-gray-100">4</button>
                <button onclick="addDigit('5')" class="keypad-btn bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 active:bg-gray-100">5</button>
                <button onclick="addDigit('6')" class="keypad-btn bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 active:bg-gray-100">6</button>
                
                <button onclick="addDigit('7')" class="keypad-btn bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 active:bg-gray-100">7</button>
                <button onclick="addDigit('8')" class="keypad-btn bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 active:bg-gray-100">8</button>
                <button onclick="addDigit('9')" class="keypad-btn bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 active:bg-gray-100">9</button>
                
                <button onclick="clearDisplay()" class="keypad-btn bg-red-100 border-2 border-red-200 text-red-600 rounded-xl hover:bg-red-200">C</button>
                <button onclick="addDigit('0')" class="keypad-btn bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 active:bg-gray-100">0</button>
                <button onclick="addDigit('00')" class="keypad-btn bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 active:bg-gray-100">00</button>
            </div>

            <button hx-post="/api/sale" 
                hx-include="[name='amount']" 
                hx-vals='{"entity_id": "cooperativa_demo", "product": "from-js"}'
                hx-target="#sale-result"
                hx-on::before-request="updateHxVals()"
                onclick="return validateSale()"
                class="w-full bg-amber-500 hover:bg-amber-600 text-white text-xl font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95">
                REGISTRAR VENDA
            </button>
        </div>

        <div class="text-center text-gray-500 text-sm">
            Use os botões para inserir o valor da venda
        </div>
    </main>

    <script>
        function updateHxVals() {
            const product = document.getElementById('product').value;
            const btn = document.querySelector('button[hx-post]');
            const amount = document.getElementById('amount').value;
            btn.setAttribute('hx-vals', JSON.stringify({
                entity_id: 'cooperativa_demo',
                product: product,
                amount: amount
            }));
        }
        let currentAmount = 0;

        function addDigit(digit) {
            const maxAmount = 99999999; // R$ 999.999,99
            const newAmount = currentAmount * Math.pow(10, digit.length) + parseInt(digit);
            
            if (newAmount <= maxAmount) {
                currentAmount = newAmount;
                updateDisplay();
            }
        }

        function clearDisplay() {
            currentAmount = 0;
            updateDisplay();
        }

        function updateDisplay() {
            const formatted = (currentAmount / 100).toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            document.getElementById('display').value = formatted;
            document.getElementById('amount').value = currentAmount;
        }

        function validateSale() {
            if (currentAmount <= 0) {
                alert('Por favor, insira um valor maior que zero');
                return false;
            }
            
            // Update the product value in the request
            const product = document.getElementById('product').value;
            const btn = document.querySelector('button[hx-post]');
            btn.setAttribute('hx-vals', `{"entity_id": "cooperativa_demo", "product": "${product}", "amount": "${currentAmount}"}`);
            
            // Clear after successful sale
            setTimeout(() => {
                clearDisplay();
            }, 500);
            
            return true;
        }

        // Pre-fill based on product selection
        document.getElementById('product').addEventListener('change', function() {
            const values = {
                'Mel': 2500,
                'Artesanato': 3500,
                'Servicos': 5000,
                'Outro': 0
            };
            
            if (values[this.value] > 0) {
                currentAmount = values[this.value];
                updateDisplay();
            }
        });
    </script>
</body>
</html>
