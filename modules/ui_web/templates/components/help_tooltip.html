{{define "help_tooltip"}}
<a href="/help/topic/{{.Key}}" 
   target="_blank" 
   class="help-tooltip-trigger inline-flex items-center justify-center w-5 h-5 rounded-full bg-blue-100 text-blue-600 hover:bg-blue-200 hover:text-blue-800 transition-all duration-200 ml-1 align-middle"
   aria-label="Saiba mais sobre {{.Title}}"
   title="Clique para entender: {{.Title}}">
   <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" 
            d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.125 2.5-2.5 2.5-.69 0-1.25.28-1.5.75-.25.47-.25 1.03 0 1.5.25.47.81.75 1.5.75 1.375 0 2.5-1.1 2.5-2.5 0-1.657-1.79-3-4-3-1.742 0-3.223.835-3.772 2z"/>
      <circle cx="12" cy="18" r="1" fill="currentColor"/>
   </svg>
</a>
{{end}}

{{/* Variante para uso em textos maiores com label visível */}}
{{define "help_link"}}
<a href="/help/topic/{{.Key}}" 
   target="_blank" 
   class="help-tooltip-trigger inline-flex items-center text-blue-600 hover:text-blue-800 hover:underline transition-colors ml-1"
   aria-label="Saiba mais sobre {{.Title}}">
   <span class="text-sm">{{.Label}}</span>
   <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
   </svg>
</a>
{{end}}

{{/* Variante para badges/tags pequenos */}}
{{define "help_badge"}}
<a href="/help/topic/{{.Key}}" 
   target="_blank" 
   class="help-tooltip-trigger inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800 hover:bg-blue-200 transition-colors"
   aria-label="Saiba mais sobre {{.Title}}"
   title="{{.Title}}">
   <span>{{.Label}}</span>
   <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.125 2.5-2.5 2.5-.69 0-1.25.28-1.5.75-.25.47-.25 1.03 0 1.5.25.47.81.75 1.5.75 1.375 0 2.5-1.1 2.5-2.5 0-1.657-1.79-3-4-3-1.742 0-3.223.835-3.772 2z"/>
   </svg>
</a>
{{end}}
