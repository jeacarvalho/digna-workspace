{{define "content"}}
<div class="min-h-screen bg-gradient-to-br from-emerald-50 to-teal-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center">
      <div class="w-16 h-16 bg-emerald-600 rounded-full flex items-center justify-center">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
    </div>
    <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
      Sistema Digna
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      Gestão Contábil para Economia Solidária
    </p>
    <p class="mt-1 text-center text-xs text-emerald-700 font-medium">
      Fundação Providentia
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-xl sm:rounded-lg sm:px-10">
      <form id="loginForm" class="space-y-6">
        <div>
          <label for="entity_id" class="block text-sm font-medium text-gray-700">
            Empresa
          </label>
          <select id="entity_id" name="entity_id" required
            class="mt-1 appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
            <option value="">Selecione uma empresa...</option>
            {{range .Companies}}
            <option value="{{.id}}">{{.name}}</option>
            {{end}}
          </select>
          
          <div class="mt-2 space-y-2">
            {{range .Companies}}
            <div class="text-xs text-gray-500 p-2 bg-gray-50 rounded">
              <span class="font-medium">{{.name}}:</span> {{.hint}}
            </div>
            {{end}}
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">
            Senha
          </label>
          <div class="mt-1 relative">
            <input id="password" name="password" type="password" autocomplete="current-password" required
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
              <button type="button" onclick="togglePassword()" class="text-gray-400 hover:text-gray-500 focus:outline-none">
                <svg id="eyeIcon" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div id="loginMessage" class="hidden"></div>

        <div>
          <button type="submit"
            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500">
            Entrar
          </button>
        </div>

        <div class="text-center">
          <p class="text-xs text-gray-500">
            Sistema em desenvolvimento<br>
            <span class="text-emerald-600 font-medium">Versão 0.4 - Social-First</span>
          </p>
        </div>
      </form>

      <div class="mt-6">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">
              Próximas integrações
            </span>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-3">
          <div class="text-center">
            <div class="text-xs text-gray-500 mb-1">Futuramente</div>
            <div class="text-sm font-medium text-emerald-700">Login Gov.br</div>
          </div>
          <div class="text-center">
            <div class="text-xs text-gray-500 mb-1">Futuramente</div>
            <div class="text-sm font-medium text-emerald-700">Certificado Digital</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function togglePassword() {
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      eyeIcon.innerHTML = `
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L6.59 6.59m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
      `;
    } else {
      passwordInput.type = 'password';
      eyeIcon.innerHTML = `
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
      `;
    }
  }

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const button = this.querySelector('button[type="submit"]');
    const messageDiv = document.getElementById('loginMessage');
    
    // Reset estado
    messageDiv.className = 'hidden';
    button.disabled = true;
    button.innerHTML = `
      <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      Entrando...
    `;
    
    try {
      const response = await fetch('/api/login', {
        method: 'POST',
        body: formData
      });
      
      const result = await response.json();
      
      if (result.success) {
        messageDiv.className = 'p-3 bg-green-100 text-green-700 rounded-md';
        messageDiv.textContent = '✅ Login realizado com sucesso! Redirecionando...';
        
        // Redirecionar após breve delay
        setTimeout(() => {
          window.location.href = result.redirect;
        }, 1000);
      } else {
        messageDiv.className = 'p-3 bg-red-100 text-red-700 rounded-md';
        messageDiv.textContent = `❌ ${result.message}`;
        button.disabled = false;
        button.textContent = 'Entrar';
      }
    } catch (error) {
      messageDiv.className = 'p-3 bg-red-100 text-red-700 rounded-md';
      messageDiv.textContent = '❌ Erro de conexão. Tente novamente.';
      button.disabled = false;
      button.textContent = 'Entrar';
    }
  });

  // Verificar sessão ao carregar a página
  window.addEventListener('load', async () => {
    try {
      const response = await fetch('/api/check-session');
      const result = await response.json();
      
      if (result.valid) {
        // Já está autenticado, redirecionar
        window.location.href = `/dashboard?entity_id=${result.entity_id}`;
      }
    } catch (error) {
      // Ignorar erros de verificação de sessão
    }
  });
</script>
{{end}}
